# ╔══════════════════════════════════════════════════════════════╗
# ║              ALACRITTY — DEEP OCEAN THEME                   ║
# ║         A rich, immersive terminal configuration            ║
# ╚══════════════════════════════════════════════════════════════╝

# ──────────────────────────────────────────────────────────────
#  WINDOW
# ──────────────────────────────────────────────────────────────
[window]
dimensions         = { columns = 120, lines = 36 }
position           = "None"
padding            = { x = 18, y = 16 }
dynamic_padding    = false
decorations        = "buttonless"          # macOS: hide title bar
opacity            = 0.94                  # subtle transparency
blur               = true                  # frosted glass (macOS/KDE)
startup_mode       = "Windowed"
title              = "Alacritty"
dynamic_title      = true
decorations_theme_variant = "Dark"

# ──────────────────────────────────────────────────────────────
#  SCROLLING
# ──────────────────────────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 3

# ──────────────────────────────────────────────────────────────
#  FONT — Cascadia Code + fallback stack
#  Install: https://github.com/microsoft/cascadia-code
#  Alternatives: JetBrains Mono, Fira Code, Iosevka
# ──────────────────────────────────────────────────────────────
[font]
size = 13.5

[font.normal]
family = "CaskaydiaCove Nerd Font"   # Nerd Font patched Cascadia
style  = "Regular"

[font.bold]
family = "CaskaydiaCove Nerd Font"
style  = "Bold"

[font.italic]
family = "CaskaydiaCove Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "CaskaydiaCove Nerd Font"
style  = "Bold Italic"

[font.offset]
x = 0
y = 2    # subtle line height increase for readability

[font.glyph_offset]
x = 0
y = 0

# ──────────────────────────────────────────────────────────────
#  COLORS — Deep Ocean Palette
#  Background: deep navy ink
#  Foreground: warm off-white
#  Accents:    amber gold, coral, seafoam, lavender
# ──────────────────────────────────────────────────────────────
[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors     = false

[colors.primary]
background = "#0d1117"    # deep ink black (GitHub dark bg)
foreground = "#e8dcc8"    # warm parchment white
dim_foreground    = "#8b8785"
bright_foreground = "#f0e8d8"

[colors.cursor]
text   = "#0d1117"
cursor = "#f0b429"    # warm amber gold

[colors.vi_mode_cursor]
text   = "#0d1117"
cursor = "#ff8c6b"    # coral for vi mode

[colors.search.matches]
foreground = "#0d1117"
background = "#f0b429"

[colors.search.focused_match]
foreground = "#0d1117"
background = "#ff8c6b"

[colors.hints.start]
foreground = "#0d1117"
background = "#52e3c2"

[colors.hints.end]
foreground = "#0d1117"
background = "#8b8785"

[colors.selection]
text       = "CellForeground"
background = "#1e3a5f"    # deep ocean blue selection

[colors.normal]
black   = "#1a1e2e"    # deep void
red     = "#ff6b6b"    # coral red
green   = "#52e3c2"    # seafoam green
yellow  = "#f0b429"    # amber gold
blue    = "#5a9eff"    # ocean blue
magenta = "#c084fc"    # soft lavender
cyan    = "#22d3ee"    # cyan breaker
white   = "#c9c0b0"    # warm grey

[colors.bright]
black   = "#3d4455"    # lifted void
red     = "#ff8585"    # bright coral
green   = "#72f5d5"    # bright seafoam
yellow  = "#ffd060"    # bright gold
blue    = "#7ab8ff"    # bright ocean
magenta = "#d8a4ff"    # bright lavender
cyan    = "#4ae8ff"    # bright cyan
white   = "#e8dcc8"    # bright parchment

[colors.dim]
black   = "#0f1219"
red     = "#c24b4b"
green   = "#3aad95"
yellow  = "#b88a20"
blue    = "#3d6fb3"
magenta = "#8a5cbf"
cyan    = "#1699b3"
white   = "#8b8785"

# ──────────────────────────────────────────────────────────────
#  BELL
# ──────────────────────────────────────────────────────────────
[bell]
animation = "EaseOutExpo"
duration  = 200
color     = "#f0b429"
command   = "None"

# ──────────────────────────────────────────────────────────────
#  SELECTION
# ──────────────────────────────────────────────────────────────
[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard     = true

# ──────────────────────────────────────────────────────────────
#  CURSOR
# ──────────────────────────────────────────────────────────────
[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style      = { shape = "Beam", blinking = "On" }
blink_interval     = 550
blink_timeout      = 10
unfocused_hollow   = true
thickness          = 0.18

# ──────────────────────────────────────────────────────────────
#  TERMINAL
# ──────────────────────────────────────────────────────────────
[terminal]
osc52 = "CopyPaste"

# ──────────────────────────────────────────────────────────────
#  MOUSE
# ──────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true
bindings = [
  { mouse = "Middle", action = "PasteSelection" },
]

# ──────────────────────────────────────────────────────────────
#  HINTS  (url clicking with keyboard)
# ──────────────────────────────────────────────────────────────
[[hints.enabled]]
command          = { program = "open", args = ["{hint}"] }  # macOS
hyperlinks       = true
post_processing  = true
persist          = false
mouse            = { enabled = true, mods = "None" }
binding          = { key = "U", mods = "Control|Shift" }
regex            = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

# ──────────────────────────────────────────────────────────────
#  KEYBOARD BINDINGS
# ──────────────────────────────────────────────────────────────
[keyboard]
bindings = [
  # ── Pane / Tab navigation (tmux-friendly) ──────────────────
  { key = "Return",    mods = "Control|Shift", action = "SpawnNewInstance" },

  # ── Font size ───────────────────────────────────────────────
  { key = "Plus",      mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",     mods = "Control",       action = "DecreaseFontSize" },
  { key = "Key0",      mods = "Control",       action = "ResetFontSize" },

  # ── Scrollback ──────────────────────────────────────────────
  { key = "PageUp",    mods = "Shift",         action = "ScrollPageUp" },
  { key = "PageDown",  mods = "Shift",         action = "ScrollPageDown" },
  { key = "Home",      mods = "Shift",         action = "ScrollToTop" },
  { key = "End",       mods = "Shift",         action = "ScrollToBottom" },
  { key = "K",         mods = "Control|Shift", action = "ScrollLineUp" },
  { key = "J",         mods = "Control|Shift", action = "ScrollLineDown" },

  # ── Clipboard ───────────────────────────────────────────────
  { key = "C",         mods = "Control|Shift", action = "Copy" },
  { key = "V",         mods = "Control|Shift", action = "Paste" },
  { key = "Insert",    mods = "Shift",         action = "PasteSelection" },

  # ── Search ──────────────────────────────────────────────────
  { key = "F",         mods = "Control|Shift", action = "SearchForward" },
  { key = "B",         mods = "Control|Shift", action = "SearchBackward" },

  # ── Vi mode ─────────────────────────────────────────────────
  { key = "Space",     mods = "Control|Shift", action = "ToggleViMode" },

  # ── Clear screen + scrollback ───────────────────────────────
  { key = "L",         mods = "Control",       action = "ClearLogNotice" },
  { key = "L",         mods = "Control",       chars  = "\f" },
]

# ──────────────────────────────────────────────────────────────
#  ENV  (uncomment if needed)
# ──────────────────────────────────────────────────────────────
